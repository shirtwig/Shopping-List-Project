<div style="direction: rtl; padding: 40px; font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh;">

  <div style="max-width: 600px; margin: 0 auto;">

    <button routerLink="/list" style="background: none; border: none; color: #1a73e8; cursor: pointer; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 5px;">
      ➔ חזרה לרשימה
    </button>

    <div style="background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); backdrop-filter: blur(10px);">

      <h1 style="margin: 0 0 30px 0; color: #2d3436; font-size: 26px; text-align: center;">
        {{ isEditMode ? 'עריכת מוצר ✏️' : 'הוספת מוצר חדש ✨' }}
      </h1>

      <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" style="display: flex; flex-direction: column; gap: 20px;">

        <div>
          <label style="display: block; margin-bottom: 8px; color: #636e72; font-weight: 600;">שם המוצר</label>
          <input type="text" formControlName="Name" placeholder="מה קונים?"
                 style="width: 100%; padding: 12px 15px; border: 2px solid #dfe6e9; border-radius: 12px; outline: none; transition: 0.3s;">
        </div>

        <div style="display: flex; gap: 15px;">
          <div style="flex: 1;">
            <label style="display: block; margin-bottom: 8px; color: #636e72; font-weight: 600;">כמות</label>
            <input type="number" formControlName="Amount"
                   style="width: 100%; padding: 12px 15px; border: 2px solid #dfe6e9; border-radius: 12px; outline: none;">
          </div>
          <div style="flex: 1;">
            <label style="display: block; margin-bottom: 8px; color: #636e72; font-weight: 600;">יחידה</label>
            <select formControlName="UnitId" style="width: 100%; padding: 12px 15px; border: 2px solid #dfe6e9; border-radius: 12px; background: white;">
              <option *ngFor="let u of units" [value]="u.Id">{{ u.Name }}</option>
            </select>
          </div>
        </div>

        <div>
          <label style="display: block; margin-bottom: 8px; color: #636e72; font-weight: 600;">קטגוריה</label>
          <select formControlName="CategoryId" style="width: 100%; padding: 12px 15px; border: 2px solid #dfe6e9; border-radius: 12px; background: white;">
            <option *ngFor="let c of categories" [value]="c.Id">{{ c.Name }}</option>
          </select>
        </div>

        <div>
          <label style="display: block; margin-bottom: 8px; color: #636e72; font-weight: 600;">סטטוס דחיפות</label>
          <select formControlName="StatusId" style="width: 100%; padding: 12px 15px; border: 2px solid #dfe6e9; border-radius: 12px; background: white;">
            <option *ngFor="let s of statuses" [value]="s.Id">{{ s.Name }}</option>
          </select>
        </div>

        <div>
          <label style="display: block; margin-bottom: 8px; color: #636e72; font-weight: 600;">הערות (אופציונלי)</label>
          <textarea formControlName="Description" rows="3" placeholder="למשל: לא את הירוק, רק את האדום..."
                    style="width: 100%; padding: 12px 15px; border: 2px solid #dfe6e9; border-radius: 12px; outline: none; resize: none;"></textarea>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 10px;">
          <button type="submit" [disabled]="!itemForm.valid"
                  style="flex: 2; background: #00b894; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 5px 15px rgba(0, 184, 148, 0.3);">
            {{ isEditMode ? 'עדכן מוצר' : 'הוסף לסל' }}
          </button>

          <button type="button" routerLink="/list"
                  style="flex: 1; background: #fab1a0; color: #d63031; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold;">
            ביטול
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
