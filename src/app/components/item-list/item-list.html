<div style="direction: rtl; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; min-height: 100vh; box-sizing: border-box;">

  <div style="max-width: 800px; margin: 0 auto;">

    <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h1 style="margin: 0; color: #2d3436; font-size: 24px; display: flex; align-items: center; gap: 8px;">
          הסל שלי <span style="font-size: 24px;">🛒</span>
        </h1>
        <button routerLink="/add" style="background: #00b894; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,184,148,0.2);">
          + מוצר חדש
        </button>
      </div>

      <div style="width: 100%; box-sizing: border-box;">
        <input type="text" [(ngModel)]="searchTerm" placeholder="חיפוש מהיר ברשימה..."
               style="width: 100%; padding: 12px 15px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 16px; outline: none; background: #fafafa; box-sizing: border-box;">
      </div>
    </div>

    <div *ngIf="filteredItems.length > 0; else emptyState">
      <div *ngFor="let item of filteredItems"
           style="background: white; margin-bottom: 12px; padding: 15px 20px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-right: 6px solid; box-sizing: border-box;"
           [style.border-right-color]="item.ColorHex || '#dfe6e9'">

        <div style="flex: 1; min-width: 0;">
          <h3 style="margin: 0 0 5px 0; color: #2d3436; font-size: 18px;">{{ item.Name }}</h3>
          <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <span style="background: #f1f2f6; color: #636e72; padding: 2px 8px; border-radius: 6px; font-size: 13px; font-weight: 500;">
              {{ item.Amount }} {{ item.UnitName }}
            </span>
            <span style="color: #b2bec3; font-size: 13px;">•</span>
            <span style="color: #636e72; font-size: 13px;">{{ item.CategoryName }}</span>
          </div>
        </div>

        <div style="display: flex; align-items: center; gap: 15px;">

          <div [style.background-color]="item.ColorHex || '#f1f2f6'"
               style="padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #2d3436; white-space: nowrap; border: 1px solid rgba(0,0,0,0.05);">
            {{ item.StatusName }}
          </div>

          <div style="display: flex; gap: 8px;">
            <button [routerLink]="['/edit', item.Id]" title="עריכה" style="border: none; background: #fff9e6; color: #ea8600; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;">✏️</button>
            <button (click)="deleteItem(item.Id)" title="מחיקה" style="border: none; background: #fff0f0; color: #ff7675; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;">🗑️</button>
          </div>
        </div>

      </div>
    </div>

    <ng-template #emptyState>
      <div style="text-align: center; padding: 40px; background: white; border-radius: 20px; color: #b2bec3;">
        <p>אין מוצרים להצגה...</p>
      </div>
    </ng-template>

  </div>
</div>
